name: Deploy QuotaJet Production

on:
  workflow_call:
    inputs:
      release_tag:
        required: true
        type: string
      image_digest:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      release_tag:
        description: Validated release tag to deploy (for example, v1.0.0)
        required: true
        type: string
      image_digest:
        description: Published GHCR image digest (sha256 plus 64 lowercase hex characters)
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: deploy-quotajet-production
  cancel-in-progress: false

jobs:
  deploy:
    environment: production
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout release
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ inputs.release_tag }}

      - name: Validate release and image
        id: image
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
          IMAGE_DIGEST: ${{ inputs.image_digest }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          semantic_version_regex='^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-(([A-Za-z][0-9A-Za-z-]*|[0-9]+[A-Za-z][0-9A-Za-z-]*)|0|[1-9][0-9]*)(\.(([A-Za-z][0-9A-Za-z-]*|[0-9]+[A-Za-z][0-9A-Za-z-]*)|0|[1-9][0-9]*))*)?$'
          normalized_version="${RELEASE_TAG#v}"
          if [[ "$RELEASE_TAG" != v* || ! "$normalized_version" =~ $semantic_version_regex ]]; then
            printf 'release tag must match v<semantic-version>\n' >&2
            exit 1
          fi
          if [[ ! "$IMAGE_DIGEST" =~ ^sha256:[0-9a-f]{64}$ ]]; then
            printf 'image digest must match sha256:<64 lowercase hex>\n' >&2
            exit 1
          fi
          git fetch --no-tags origin "+refs/heads/${DEFAULT_BRANCH}:refs/remotes/origin/${DEFAULT_BRANCH}"
          if ! git fetch --no-tags origin "+refs/tags/${RELEASE_TAG}:refs/tags/${RELEASE_TAG}"; then
            printf 'release tag does not exist\n' >&2
            exit 1
          fi
          tag_commit="$(git rev-parse "refs/tags/${RELEASE_TAG}^{commit}")"
          if ! git merge-base --is-ancestor "$tag_commit" "origin/${DEFAULT_BRANCH}"; then
            printf 'release tag commit is not reachable from origin/%s\n' "$DEFAULT_BRANCH" >&2
            exit 1
          fi
          if [[ "$(git rev-parse HEAD)" != "$tag_commit" ]]; then
            printf 'checked out commit does not match release tag\n' >&2
            exit 1
          fi
          image_reference="ghcr.io/follen/sub2api@${IMAGE_DIGEST}"
          docker pull "$image_reference"
          image_version="$(docker image inspect --format '{{ index .Config.Labels "org.opencontainers.image.version" }}' "$image_reference")"
          if [[ "$image_version" != "$normalized_version" ]]; then
            printf 'OCI version label does not match release version\n' >&2
            exit 1
          fi
          image_revision="$(docker image inspect --format '{{ index .Config.Labels "org.opencontainers.image.revision" }}' "$image_reference")"
          if [[ "$image_revision" != "$tag_commit" ]]; then
            printf 'OCI revision label does not match release commit\n' >&2
            exit 1
          fi
          printf 'image=%s\n' "$image_reference" >> "$GITHUB_OUTPUT"
          printf 'version=%s\n' "$normalized_version" >> "$GITHUB_OUTPUT"
          printf 'tag_commit=%s\n' "$tag_commit" >> "$GITHUB_OUTPUT"

      - name: Configure SSH
        env:
          PROD_DEPLOY_SSH_KEY: ${{ secrets.PROD_DEPLOY_SSH_KEY }}
          PROD_DEPLOY_KNOWN_HOSTS: ${{ secrets.PROD_DEPLOY_KNOWN_HOSTS }}
        run: |
          install -m 700 -d "$HOME/.ssh"
          printf '%s\n' "$PROD_DEPLOY_SSH_KEY" > "$HOME/.ssh/quotajet-deploy"
          printf '%s\n' "$PROD_DEPLOY_KNOWN_HOSTS" > "$HOME/.ssh/known_hosts"
          chmod 600 "$HOME/.ssh/quotajet-deploy" "$HOME/.ssh/known_hosts"
          test -s "$HOME/.ssh/quotajet-deploy"
          test -s "$HOME/.ssh/known_hosts"

      - name: Create bootstrap values
        env:
          PROD_ADMIN_EMAIL: ${{ secrets.PROD_ADMIN_EMAIL }}
          PROD_ADMIN_PASSWORD: ${{ secrets.PROD_ADMIN_PASSWORD }}
        run: |
          umask 077
          test -n "$PROD_ADMIN_EMAIL"
          test -n "$PROD_ADMIN_PASSWORD"
          {
            printf 'ADMIN_EMAIL_B64='
            printf '%s' "$PROD_ADMIN_EMAIL" | base64 | tr -d '\n'
            printf '\nADMIN_PASSWORD_B64='
            printf '%s' "$PROD_ADMIN_PASSWORD" | base64 | tr -d '\n'
            printf '\n'
          } > .bootstrap.env
          chmod 600 .bootstrap.env

      - name: Create production application directory
        env:
          PROD_DEPLOY_HOST: ${{ secrets.PROD_DEPLOY_HOST }}
          PROD_DEPLOY_USER: ${{ secrets.PROD_DEPLOY_USER }}
        run: |
          ssh -i "$HOME/.ssh/quotajet-deploy" \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            -o UserKnownHostsFile="$HOME/.ssh/known_hosts" \
            "${PROD_DEPLOY_USER}@${PROD_DEPLOY_HOST}" \
            'install -d -m 700 /www/apps/quotajet-next'

      - name: Upload deployment artifacts
        env:
          PROD_DEPLOY_HOST: ${{ secrets.PROD_DEPLOY_HOST }}
          PROD_DEPLOY_USER: ${{ secrets.PROD_DEPLOY_USER }}
        run: |
          scp -i "$HOME/.ssh/quotajet-deploy" \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            -o UserKnownHostsFile="$HOME/.ssh/known_hosts" \
            deploy/docker-compose.local.yml \
            deploy/docker-compose.quotajet.yml \
            deploy/quotajet.env.example \
            deploy/quotajet-brand.sql \
            deploy/quotajet-deploy.sh \
            "${PROD_DEPLOY_USER}@${PROD_DEPLOY_HOST}:/www/apps/quotajet-next/"

      - name: Run production deployment
        env:
          PROD_DEPLOY_HOST: ${{ secrets.PROD_DEPLOY_HOST }}
          PROD_DEPLOY_USER: ${{ secrets.PROD_DEPLOY_USER }}
          SUB2API_IMAGE: ${{ steps.image.outputs.image }}
          SUB2API_VERSION: ${{ steps.image.outputs.version }}
        run: |
          cleanup_bootstrap() {
            rm -f .bootstrap.env || true
          }
          trap cleanup_bootstrap EXIT
          test -s .bootstrap.env
          printf -v remote_command \
            'cd /www/apps/quotajet-next && exec env SUB2API_IMAGE=%q SUB2API_VERSION=%q QUOTAJET_BOOTSTRAP_STDIN=1 bash ./quotajet-deploy.sh' \
            "$SUB2API_IMAGE" "$SUB2API_VERSION"
          ssh -i "$HOME/.ssh/quotajet-deploy" \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            -o UserKnownHostsFile="$HOME/.ssh/known_hosts" \
            "${PROD_DEPLOY_USER}@${PROD_DEPLOY_HOST}" \
            "$remote_command" < .bootstrap.env

      - name: Cleanup bootstrap values
        if: ${{ always() }}
        run: rm -f .bootstrap.env || true
