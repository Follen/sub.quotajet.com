name: Deploy QuotaJet Test

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-quotajet-test
  cancel-in-progress: true

jobs:
  deploy:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main' &&
      github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Configure SSH
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/quotajet-deploy
          printf '%s\n' "$DEPLOY_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/quotajet-deploy ~/.ssh/known_hosts
          test -s ~/.ssh/quotajet-deploy
          test -s ~/.ssh/known_hosts

      - name: Deploy main to test server
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          ssh -i ~/.ssh/quotajet-deploy \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            "${DEPLOY_USER}@${DEPLOY_HOST}" \
            'set -e
            repo_dir=/opt/sub.quotajet.com
            if [ ! -d "$repo_dir/.git" ]; then
              git clone https://github.com/Follen/sub.quotajet.com.git "$repo_dir"
            fi
            cd "$repo_dir"
            git fetch origin main
            git checkout main
            git reset --hard origin/main
            bash deploy/quotajet-deploy.sh'
